function calcInv(lines) { let s = 0, vf = 0; lines.forEach(l => { if (l.vatFree) vf += l.exkl; else s += l.exkl; }); const m = s * 0.25; return { subExkl: s, moms: m, vatFreeTotal: vf, total: s + m + vf }; }
function yExkl(b) { return b.yourSpot + 0.0604 + 0.189 + 0.36; }
function sExkl(b) { return b.se3Spot + 0.0604 + 0.189 + 0.36; }

function Bar({ segs, h = 10 }) { let t = 0; segs.forEach(s => t += Math.max(0, s.v)); if (!t) return null; return (<div style={{ display: "flex", height: h, borderRadius: 5, overflow: "hidden", gap: 1 }}>{segs.map((s, i) => s.v <= 0 ? null : <div key={i} style={{ width: (s.v / t * 100) + "%", background: s.c, opacity: s.o || 1 }} />)}</div>); }

function FlowTab({ d }) {
  const [mode, setMode] = useState("kWh");
  const [exp, setExp] = useState(null);
  const f = d.flow; const kr = mode === "kr";
  let tH = 0, tSD = 0, tVB = 0, tS = 0;

  let evSD = 0, evVB = 0; f.ev.chargers.forEach(ch => { evSD += ch.solarDirect; evVB += ch.viaBattery; });
  const evSelf = evSD + evVB;
  const gC = calcInv(d.bill.grid.lines), bC = calcInv(d.bill.buy.lines);
  const sCr = d.bill.sell.lines.filter(l => l.exkl < 0).reduce((s, l) => s + l.exkl, 0);
  const sM = d.bill.sell.lines.find(l => l.moms)?.moms || 0;
  const sT = sCr + sM; const gross = gC.total + bC.total; const net = gross + sT;
  const buyPr = gross / f.grid.purchased;
  const soldRev = Math.abs(sT);
  const hCG = (tH - tS) * buyPr, evCG = (f.ev.total - evSelf) * buyPr;
  const solSaved = f.solar.selfConsumed * buyPr;
  const tog = id => setExp(exp === id ? null : id);
  const batT = f.battery.chargeGrid + f.battery.chargeSolar;
  const batLP = Math.round(f.battery.loss / batT * 100);
  const solUse = Math.round(f.solar.selfConsumed / f.solar.produced * 100);

  return (<div>
    <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 14, flexWrap: "wrap" }}>
      {[{ c: CL.grid, l: "Elnät" },{ c: CL.solar, l: "Direktanvänd solel" },{ c: CL.battery, l: "Via batteri" },{ c: CL.sold, l: "Såld" },{ c: CL.house, l: "Bostad" },{ c: CL.ev, l: "Elbil" }].map((x, i) => <span key={i} style={{ display: "flex", alignItems: "center", gap: 3, fontSize: 10, color: "#64748b" }}><span style={{ width: 8, height: 8, borderRadius: 2, background: x.c, display: "inline-block" }} />{x.l}</span>)}
    </div>
    <div style={{ padding: "16px 18px", borderRadius: 14, background: "#f8fafc", border: "1px solid #e2e8f0" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1.5 }}>Visa i</div>
        <div style={{ display: "flex", background: "#e2e8f0", borderRadius: 8, padding: 2, width: 120 }}>{["kWh", "kr"].map(m => <button key={m} onClick={() => setMode(m)} style={{ flex: 1, padding: "5px 10px", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 11, fontWeight: 700, background: mode === m ? "#fff" : "transparent", color: mode === m ? "#1e293b" : "#94a3b8", boxShadow: mode === m ? "0 1px 2px rgba(0,0,0,.08)" : "none" }}>{m}</button>)}</div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}><div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1.5 }}>{kr ? "Vad kostade elen?" : "Varifrån kom elen?"}</div><div style={{ fontSize: 13, fontWeight: 800, color: "#1e293b" }}>{kr ? fk(gross) + " kr" : (f.grid.purchased + f.solar.selfConsumed) + " kWh"}</div></div>
      <div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 8 }}>{kr ? "Bruttokostnad elnät + elhandel" : "Förbrukad el — köpt från nätet + egenanvänd sol"}</div>
      <Bar segs={[{ v: kr ? gross : f.grid.purchased, c: CL.grid, o: 0.7 },{ v: kr ? 1 : f.solar.selfConsumed, c: CL.solar }]} h={16} />
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
        <div><div style={{ fontSize: 10, color: "#94a3b8" }}>🔌 {kr ? "Köpt el" : "Elnätet"}</div><span style={{ fontSize: 16, fontWeight: 800, color: CL.grid }}>{kr ? fk(gross) : f.grid.purchased} <span style={{ fontSize: 11, fontWeight: 600 }}>{kr ? "kr" : "kWh"}</span></span>{kr && <div style={{ fontSize: 10, color: "#94a3b8" }}>{fd(buyPr)} kr/kWh snitt</div>}</div>

// BILL TAB (R1-R8 fixed)

function BillTab({ d, histIdx, setMonth }) {
  const [openCard, setOpenCard] = useState(null);
  const [explains, setExplains] = useState({});
  const [mm, setMm] = useState({});
  const gC = calcInv(d.bill.grid.lines), bC = calcInv(d.bill.buy.lines);
  const sCr = d.bill.sell.lines.filter(l => l.exkl < 0).reduce((s, l) => s + l.exkl, 0);
  const sMom = d.bill.sell.lines.find(l => l.moms)?.moms || 0;
  const sT = sCr + sMom; const gross = gC.total + bC.total; const sA = Math.abs(sT); const net = gross + sT;
  const gPct = Math.round(gC.total / gross * 100), bPct = 100 - gPct;
  const sPct = Math.round(sA / gross * 100);
  const abon = 459.90 * 1.25; const cpp = (net - abon) / d.flow.grid.purchased;


  const invs = [
    { key: "grid", ...IM.grid, total: gC.total, calc: gC },
    { key: "buy", ...IM.buy, total: bC.total, calc: bC },
    { key: "sell", ...IM.sell, contract: d.flow.sold.total + " kWh såld", total: sT },
  ];

  function InvLine({ l, momsMode }) {
    const neg = l.exkl < 0; const ae = Math.abs(l.exkl); const ai = l.vatFree ? ae : ae * 1.25;
    const prim = momsMode === "inkl" ? ai : ae; const sec = momsMode === "inkl" ? ae : ai;
    const secLab = momsMode === "inkl" ? "exkl moms" : "inkl moms";
    return (<div style={{ borderBottom: "1px solid #f1f5f9" }}>
      <div onClick={() => setExplains(p => ({ ...p, [l.id]: !p[l.id] }))} style={{ display: "flex", alignItems: "center", padding: "10px 0", cursor: "pointer", userSelect: "none" }}>
        <div style={{ flex: 1, minWidth: 0 }}><div style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ fontSize: 12, fontWeight: 600, color: neg ? "#16a34a" : "#1e293b" }}>{l.label}</span><span style={{ fontSize: 10, color: "#cbd5e1" }}>ⓘ</span></div>{l.detail && <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 1 }}>{l.detail}</div>}</div>
        <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 12 }}><div style={{ fontSize: 13, fontWeight: 700, color: neg ? "#16a34a" : "#1e293b" }}>{neg ? "−" : ""}{fk(prim)} kr</div>{!l.vatFree && <div style={{ fontSize: 9, color: "#b0b8c4" }}>{secLab} {neg ? "−" : ""}{fk(sec)}</div>}{l.vatFree && <div style={{ fontSize: 9, color: "#b0b8c4" }}>momsfri</div>}</div>
      </div>
      {explains[l.id] && <div style={{ padding: "0 0 10px", marginTop: -4 }}><div style={{ padding: "8px 12px", borderRadius: 8, background: "#f0f9ff", border: "1px solid #bae6fd", fontSize: 11, color: "#0369a1", lineHeight: 1.5 }}>{l.explain}</div></div>}
    </div>);
  }

  return (<div>
    {/* Summary */}
    <div style={{ padding: "16px 18px", borderRadius: 14, background: "#f8fafc", border: "1px solid #e2e8f0", marginBottom: 14 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 12 }}>Dina elräkningar i {d.label.toLowerCase()}</div>
      {invs.map((inv, i) => { const neg = inv.total < 0; const abs = Math.abs(inv.total); return (
        <div key={inv.key} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: i < 2 ? "1px solid #e2e8f0" : "none" }}>
          <span style={{ fontSize: 18 }}>{inv.icon}</span><div style={{ flex: 1 }}><div style={{ fontSize: 12.5, fontWeight: 600, color: "#1e293b" }}>{inv.type}</div><div style={{ fontSize: 10, color: "#94a3b8" }}>{inv.provider}</div></div>
          <div style={{ textAlign: "right" }}><span style={{ fontSize: 15, fontWeight: 800, color: neg ? "#16a34a" : "#1e293b", fontVariantNumeric: "tabular-nums" }}>{neg ? "−" : ""}{fk(abs)} kr</span><div style={{ fontSize: 8, color: "#b0b8c4" }}>inkl moms</div></div>
        </div>); })}
      {/* Bars */}
      <div style={{ marginTop: 16 }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}><span style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1 }}>Att betala</span><span style={{ fontSize: 12, fontWeight: 700, color: "#475569" }}>{fk(gross)} kr</span></div>
        <div style={{ display: "flex", height: 14, borderRadius: 5, overflow: "hidden", gap: 1.5 }}><div style={{ width: gPct + "%", background: "#1e293b", borderRadius: 3, opacity: 0.7 }} /><div style={{ width: bPct + "%", background: "#3b82f6", borderRadius: 3, opacity: 0.7 }} /></div>
        <div style={{ display: "flex", gap: 1.5, marginTop: 3 }}><div style={{ width: gPct + "%" }}><div style={{ fontSize: 9, color: "#1e293b", fontWeight: 600 }}>{fk(gC.total)} kr</div><div style={{ fontSize: 8, color: "#94a3b8" }}>Elnät ({gPct}%)</div></div><div style={{ width: bPct + "%" }}><div style={{ fontSize: 9, color: "#3b82f6", fontWeight: 600 }}>{fk(bC.total)} kr</div><div style={{ fontSize: 8, color: "#94a3b8" }}>Elhandel köp ({bPct}%)</div></div></div>
      </div>
      <div style={{ marginTop: 14 }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}><span style={{ fontSize: 10, fontWeight: 700, color: "#16a34a", textTransform: "uppercase", letterSpacing: 1 }}>Tillbaka för såld solel</span><span style={{ fontSize: 12, fontWeight: 700, color: "#16a34a" }}>−{fk(sA)} kr</span></div>
        <div style={{ display: "flex", height: 14, borderRadius: 5, overflow: "hidden" }}><div style={{ width: sPct + "%", background: "#16a34a", borderRadius: 3, opacity: 0.6 }} /><div style={{ width: (100 - sPct) + "%", background: "#f1f5f9", borderRadius: 3 }} /></div>
        <div style={{ fontSize: 8, color: "#94a3b8", marginTop: 3 }}>{sPct}% av kostnaden täcks av solelsförsäljning</div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "10px 14px", borderRadius: 10, background: "#fff", border: "1px solid #e2e8f0", marginTop: 14 }}><span style={{ fontSize: 13, fontWeight: 600, color: "#475569" }}>Netto att betala</span><span style={{ fontSize: 22, fontWeight: 800, color: "#1e293b" }}>{fk(net)} <span style={{ fontSize: 13, fontWeight: 600 }}>kr</span></span></div>
    </div>

    {/* FIX R1+R5+R6+R7+R8: All 3 invoice cards with full features */}
    <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1.5, paddingLeft: 2, marginBottom: 6 }}>Klicka för att se din faktura</div>
    {[{ k: "grid", inv: IM.grid, lines: d.bill.grid.lines, calc: gC },{ k: "buy", inv: IM.buy, lines: d.bill.buy.lines, calc: bC }].map(({ k, inv, lines, calc }) => {
      const open = openCard === k; const momsM = mm[k] || "exkl";
      return (<div key={k} style={{ borderRadius: 12, border: "1.5px solid " + inv.color + "20", background: "#fff", overflow: "hidden", marginBottom: 14 }}>
        <div onClick={() => setOpenCard(open ? null : k)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", cursor: "pointer", userSelect: "none" }}>
          <span style={{ fontSize: 22 }}>{inv.icon}</span><div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 700, color: "#1e293b" }}>{inv.type}</div><div style={{ fontSize: 10.5, color: "#94a3b8" }}>{inv.provider} · {inv.contract}</div></div>
          <span style={{ fontSize: 14, fontWeight: 800, color: inv.color }}>{fk(calc.total)} <span style={{ fontSize: 10, fontWeight: 600 }}>kr inkl moms</span></span><Chev open={open} />
        </div>
        {open && <div style={{ padding: "0 14px 14px", borderTop: "1px solid #f0f0f0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 9, color: "#cbd5e1" }}>Klicka rad för ⓘ</span>
            <div style={{ display: "flex", alignItems: "center", gap: 2, padding: "8px 0 6px" }}><span style={{ fontSize: 9, color: "#94a3b8", marginRight: 4 }}>Visa belopp:</span>{["exkl","inkl"].map(m => <button key={m} onClick={() => setMm(p => ({ ...p, [k]: m }))} style={{ padding: "3px 8px", border: "none", borderRadius: 4, cursor: "pointer", fontSize: 10, fontWeight: momsM === m ? 700 : 500, background: momsM === m ? "#f1f5f9" : "transparent", color: momsM === m ? "#1e293b" : "#c0c8d4", transition: "all .12s" }}>{m} moms</button>)}</div>
          </div>
          {lines.map(l => <InvLine key={l.id} l={l} momsMode={momsM} />)}
          <div style={{ borderTop: "1px solid #e2e8f0", marginTop: 4 }}>

              </div>}
            </div>}
            {isExp && st.id === "sell" && <div style={{ marginTop: 10, borderTop: "1px solid #f1f5f9", paddingTop: 8, display: "flex", gap: 12, alignItems: "flex-end" }}><div><div style={{ fontSize: 8, color: "#94a3b8" }}>Du sålde</div><div style={{ fontSize: 18, fontWeight: 800, color: "#22c55e" }}>{fd(s.sell.yourPrice)}</div><div style={{ fontSize: 9, color: "#94a3b8" }}>kr/kWh</div></div><div style={{ fontSize: 10, color: "#94a3b8", paddingBottom: 2 }}>vs</div><div><div style={{ fontSize: 8, color: "#94a3b8" }}>SE3-snitt</div><div style={{ fontSize: 18, fontWeight: 800, color: "#94a3b8" }}>{fd(s.sell.se3Price)}</div><div style={{ fontSize: 9, color: "#94a3b8" }}>kr/kWh</div></div><div style={{ marginLeft: "auto" }}><div style={{ fontSize: 16, fontWeight: 800, color: "#22c55e" }}>+{sellP}%</div></div></div>}
            {isExp && st.id === "peak" && <div style={{ marginTop: 10, borderTop: "1px solid #f1f5f9", paddingTop: 8, display: "flex", gap: 8 }}><div style={{ flex: 1, padding: "6px 8px", borderRadius: 6, background: "#fef2f2", textAlign: "center" }}><div style={{ fontSize: 8, color: "#dc2626", fontWeight: 600 }}>UTAN</div><div style={{ fontSize: 16, fontWeight: 800, color: "#dc2626" }}>~{fd(s.peak.withoutThiink)}</div><div style={{ fontSize: 8, color: "#94a3b8" }}>kW → {fk(Math.round(s.peak.withoutThiink * s.peak.rate))} kr</div></div><div style={{ flex: 1, padding: "6px 8px", borderRadius: 6, background: "#f0fdf4", textAlign: "center" }}><div style={{ fontSize: 8, color: "#16a34a", fontWeight: 600 }}>MED</div><div style={{ fontSize: 16, fontWeight: 800, color: "#16a34a" }}>{fd(s.peak.actual)}</div><div style={{ fontSize: 8, color: "#94a3b8" }}>kW → {fk(Math.round(s.peak.actual * s.peak.rate))} kr</div></div></div>}
            {isExp && st.id === "ev" && <div style={{ marginTop: 10, borderTop: "1px solid #f1f5f9", paddingTop: 8 }}><div style={{ display: "flex", gap: 12, alignItems: "flex-end" }}><div><div style={{ fontSize: 8, color: "#94a3b8" }}>Laddpris</div><div style={{ fontSize: 18, fontWeight: 800, color: "#06b6d4" }}>{fd(s.ev.avgChargePrice)}</div><div style={{ fontSize: 9, color: "#94a3b8" }}>kr/kWh</div></div><div style={{ fontSize: 10, color: "#94a3b8", paddingBottom: 2 }}>vs SE3 {fd(s.ev.se3Price)}</div><div style={{ marginLeft: "auto", fontSize: 16, fontWeight: 800, color: "#22c55e" }}>−{evPct}%</div></div><div style={{ fontSize: 9, color: "#64748b", marginTop: 4 }}>{s.ev.totalKwh} kWh · {s.ev.solarPct}% solel · {s.ev.chargers}</div></div>}
            {isExp && st.id === "solar" && <div style={{ marginTop: 10, borderTop: "1px solid #f1f5f9", paddingTop: 8 }}>
              <div style={{ display: "flex", gap: 8, marginBottom: 6 }}><div style={{ flex: 1, padding: "6px 8px", borderRadius: 6, background: "#fffbeb", textAlign: "center" }}><div style={{ fontSize: 8, color: "#94a3b8" }}>Undvikna inköp</div><div style={{ fontSize: 14, fontWeight: 800, color: "#d97706" }}>{fk(s.solar.selfConsumedValue)} kr</div></div><div style={{ flex: 1, padding: "6px 8px", borderRadius: 6, background: "#f0fdf4", textAlign: "center" }}><div style={{ fontSize: 8, color: "#94a3b8" }}>Såld solel</div><div style={{ fontSize: 14, fontWeight: 800, color: "#16a34a" }}>{fk(s.solar.soldValue)} kr</div></div></div>
              {s.solar.curtailedKwh > 0 && <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 8px", borderRadius: 6, background: "#fef2f2", border: "1px solid #fecaca" }}><span>🛑</span><div style={{ flex: 1, fontSize: 9, color: "#64748b" }}>Strypt export {s.solar.curtailedHours}h negativt pris · {s.solar.curtailedKwh} kWh → +{s.solar.curtailedSavedKr} kr</div></div>}
            </div>}
          </div>
        </div>
      </div>); })}

    {/* FIX S1: Savings chart with accumulation */}
    <div style={{ padding: "14px 16px", borderRadius: 12, background: "#fff", border: "1px solid #e2e8f0", marginTop: 6, marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}><div style={{ fontSize: 13, fontWeight: 700, color: "#1e293b" }}>Besparing över tid</div><div style={{ fontSize: 9, color: "#94a3b8" }}>Sedan du blev kund (sep 2025)</div></div>
      <div style={{ position: "relative", height: 140, padding: "0 2px" }}>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 140, position: "relative", zIndex: 1 }}>
          {savSlice.map((h, i) => { const bH = Math.round((h.saving / maxSav) * 120); const cur = i === savSlice.length - 1; const click = h.mk && !cur; return (
            <div key={i} onClick={() => click && setMonth(h.mk)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, cursor: click ? "pointer" : "default" }}>
              <span style={{ fontSize: 8, fontWeight: 700, color: cur ? "#166534" : "#94a3b8" }}>{fk(h.saving)}</span>
              <div style={{ width: "100%", height: bH, borderRadius: 4, background: cur ? "linear-gradient(to top, #16a34a, #22c55e)" : "linear-gradient(to top, #86efac, #bbf7d0)", opacity: cur ? 1 : click ? 0.85 : 0.7 }} />
            </div>); })}
        </div>
        <svg style={{ position: "absolute", top: 0, left: 0, width: "100%", height: 140, pointerEvents: "none", zIndex: 2 }} viewBox={`0 0 ${savSlice.length * 100} 140`} preserveAspectRatio="none">
          <polyline fill="none" stroke="#14532d" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" points={savSlice.map((h, i) => { const x = i * 100 + 50; const y = 130 - (cumArr[i] / maxCum) * 110; return `${x},${y}`; }).join(" ")} />
          {savSlice.map((h, i) => { const x = i * 100 + 50; const y = 130 - (cumArr[i] / maxCum) * 110; return <circle key={i} cx={x} cy={y} r={i === savSlice.length - 1 ? 5 : 3} fill={i === savSlice.length - 1 ? "#14532d" : "#22c55e"} stroke="#fff" strokeWidth="1.5" />; })}
        </svg>
      </div>
      <div style={{ display: "flex", gap: 6, marginTop: 4, padding: "0 2px" }}>{savSlice.map((h, i) => { const cur = i === savSlice.length - 1; const click = h.mk && !cur; return <div key={i} onClick={() => click && setMonth(h.mk)} style={{ flex: 1, textAlign: "center", fontSize: 9, fontWeight: cur ? 700 : click ? 600 : 400, color: cur ? "#166534" : click ? "#16a34a" : "#94a3b8", cursor: click ? "pointer" : "default", textDecoration: click ? "underline" : "none" }}>{h.label}</div>; })}</div>
      <div style={{ display: "flex", gap: 14, justifyContent: "center", marginTop: 8 }}><span style={{ display: "flex", alignItems: "center", gap: 3, fontSize: 9, color: "#64748b" }}><span style={{ width: 8, height: 8, borderRadius: 2, background: "#22c55e", display: "inline-block" }} />Besparing per månad (kr)</span><span style={{ display: "flex", alignItems: "center", gap: 3, fontSize: 9, color: "#64748b" }}><span style={{ width: 12, height: 2, background: "#14532d", display: "inline-block", borderRadius: 1 }} />Ackumulerad (kr)</span></div>
    </div>

    {/* FIX S2: Bottom line */}
    <div style={{ padding: "16px 18px", borderRadius: 14, background: "linear-gradient(135deg, #14532d, #166534)", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: -15, right: -15, width: 60, height: 60, borderRadius: "50%", background: "rgba(255,255,255,0.04)" }} />
      <div style={{ fontSize: 13, fontWeight: 700, color: "#86efac", marginBottom: 6, position: "relative" }}>Hittills 2026</div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", position: "relative" }}><span style={{ fontSize: 12, color: "rgba(255,255,255,0.7)" }}>Total besparing</span><span style={{ fontSize: 28, fontWeight: 800, color: "#fff" }}>{fk(y2026sav)} <span style={{ fontSize: 14, fontWeight: 600 }}>kr</span></span></div>
      {y2025sav > 0 && <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 6, position: "relative" }}><span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>2025 (sep–dec)</span><span style={{ fontSize: 14, fontWeight: 700, color: "rgba(255,255,255,0.5)" }}>{fk(y2025sav)} kr</span></div>}
    </div>
  </div>);
}

// ══════════════════════════════════
// MAIN APP
// ══════════════════════════════════
function Report() {
  const [month, setMonth] = useState("mar");
  const [tab, setTab] = useState("flow");
  const d = DATA[month];
  const histMap = { mar: 6, apr: 7, maj: 8 };
  const histIdx = histMap[month];

  return (
    <div style={{ fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", maxWidth: 600, margin: "0 auto", padding: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
        <div style={{ width: 36, height: 36, borderRadius: 9, background: "#1e293b", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 14 }}>ii</div>
        <div><div style={{ fontSize: 18, fontWeight: 800, color: "#1e293b" }}>Månadsrapport</div><div style={{ fontSize: 12, color: "#64748b" }}>{d.label}</div></div>
      </div>
      <div style={{ display: "flex", gap: 3, marginBottom: 10, background: "#f1f5f9", borderRadius: 10, padding: 3 }}>
        {[["flow","⚡ Flöde"],["bill","💰 Räkning"],["savings","📉 Besparing"]].map(t => (
          <div key={t[0]} onClick={() => setTab(t[0])} style={{ flex: 1, padding: "9px 8px", borderRadius: 8, fontSize: 12.5, fontWeight: 600, textAlign: "center", cursor: "pointer", background: tab === t[0] ? "#fff" : "transparent", color: tab === t[0] ? "#1e293b" : "#94a3b8", boxShadow: tab === t[0] ? "0 1px 3px rgba(0,0,0,.08)" : "none", transition: "all .15s" }}>{t[1]}</div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 2, marginBottom: 16, padding: "0 2px" }}>
        {MKL.map((k, i) => {
          const isA = activeM[k]; const isC = k === month;
          return (<button key={k} onClick={() => isA && setMonth(k)} style={{ flex: 1, padding: "6px 0", border: "none", borderRadius: 6, cursor: isA ? "pointer" : "default", fontSize: 10, fontWeight: isC ? 800 : 600, letterSpacing: 0.3, background: isC ? "#1e293b" : "transparent", color: isC ? "#fff" : isA ? "#475569" : "#d1d5db" }}>
            {MK[i]}
            {isA && !isC && <div style={{ width: 4, height: 4, borderRadius: 2, background: "#94a3b8", margin: "2px auto 0" }} />}
          </button>);
        })}
      </div>
      {tab === "flow" && <FlowTab d={d} />}
      {tab === "bill" && <BillTab d={d} histIdx={histIdx} setMonth={setMonth} />}
      {tab === "savings" && <SavingsTab d={d} histIdx={histIdx} setMonth={setMonth} />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Report));
  </script>
